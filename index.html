


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Professional Portfolio</title>
    <link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>

    <h1>Welcome to My Website</h1>
    <button id="mode-toggle">Switch Theme</button>

    
    <!-- This line looks for the image in the SAME folder -->
    <img src="JOE.jpg" alt="A photo of me" width="300">

    <p>I am officially a developer in training!</p>

    <h3>Current Projects:</h3>
    <ul>
        <li></li>
        <li>Learning HTML Tags</li>
    </ul>

    <nav>
    <div class="logo">My Portfolio</div>
    <div class="links">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </div>
</nav>
<section id="contact">
    <h2>Contact Me</h2>
    <!-- The "data-netlify" part is the magic! -->
    <form name="contact" method="POST" data-netlify="true">
        <p>
            <label>Your Name: <input type="text" name="name" required /></label>
        </p>
        <p>
            <label>Your Email: <input type="email" name="email" required /></label>
        </p>
        <p>
            <label>Message: <textarea name="message" required></textarea></label>
        </p>
        <p>
            <button type="submit">Send Message</button>
        </p>
    </form>
</section>

<script src="script.js"></script>

</body>
</html>
