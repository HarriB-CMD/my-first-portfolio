<head>

<meta property="og:title" content="Sister's Boutique">

    <meta charset="UTF-8">
    <title>CHRISWALD</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>

    <h1>CHRISWALD IMPORTS AND COLLECTIONS</h1>
    <button id="mode-toggle">Switch Theme</button>

    
    <!-- This line looks for the image in the SAME folder -->
    <img src="JOE.jpg" alt="A photo of me" width="300">

    <p>Home Of Quality Goods </p>

    
    <ul>
        <li></li>
        <li>  </li>
    </ul>

    <nav>
    <div class="logo">CHRISWALD WORLD</div>
    <div class="links">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </div>
</nav>
<section id="shop">
    <h2>CHRISWALD & Home</h2>

<section id="filter-section">
    <!-- The Search Bar -->
    <div class="search-container">
        <input type="text" id="product-search" placeholder="Search clothes or appliances..." onkeyup="filterProducts()">
    </div>

    <!-- Category Filters -->
    <div class="category-buttons">
        <button class="btn-filter active" onclick="filterCategory('all')">All</button>
        <button class="btn-filter" onclick="filterCategory('Clothes')">Clothes</button>
        <button class="btn-filter" onclick="filterCategory('Appliances')">Appliances</button>
        <button class="btn-filter" onclick="filterCategory('Shoes')">Shoes</button>
   
    </div>
</section>


    <div id="product-container" class="project-grid">
<div id="no-results" style="display: none; text-align: center; padding: 20px;">
    <h3>Sorry! 🛍️</h3>
    <p>We couldn't find any products matching that search.</p>
</div>

        <!-- JavaScript will inject the products here! -->
    </div>
</section>
